name: Build Windows & Android

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Load Signing Key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          echo "TAURI_SIGNING_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          echo "$RAW_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Read Version
        id: version
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build Tauri Windows App
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: app-v${{ steps.version.outputs.version }}
          releaseName: VITE POS v${{ steps.version.outputs.version }}
          releaseBody: |
            Automatic release generated by GitHub Actions.
          releaseDraft: false
          prerelease: false
          projectPath: .
          args: --target x86_64-pc-windows-msvc

      - name: Show Generated Files
        shell: pwsh
        run: |
          echo "GITHUB_WORKSPACE=$env:GITHUB_WORKSPACE"
          Get-ChildItem `
            -Path src-tauri/target `
            -Recurse `
            -File |
            Select-Object FullName

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VITEPOS-Windows
          path: |
            src-tauri/target/**/bundle/**/*
          retention-days: 30

  build-android:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build

      - name: Sync Android
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Read Version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-Release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Attach APKs To Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ steps.version.outputs.version }}
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
