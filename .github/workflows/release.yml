name: Build Windows

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Clean Signing Key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          CLEAN_KEY=$(echo "$RAW_KEY" | tr -d '\r\n')
          echo "TAURI_SIGNING_PRIVATE_KEY=$CLEAN_KEY" >> $GITHUB_ENV

      - name: Build Tauri App (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          projectPath: "."
          args: "--target x86_64-pc-windows-msvc"

      - name: Show Built Files (Debug)
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/release -Recurse -Include *.exe,*.msi -ErrorAction SilentlyContinue | Select-Object FullName
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: VITEPOSs-Windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/
          if-no-files-found: error
          retention-days: 30

  build-android:
    needs: build-windows
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Debug APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: App-Android-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: App-Android-Release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APKs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ steps.get_version.outputs.version }}
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
