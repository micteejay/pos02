name: Build Windows

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    permissions:
      contents: write

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri App (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          projectPath: "."
          args: "--target x86_64-pc-windows-msvc"

      - name: Show Built Files (Debug)
        shell: pwsh
        run: |
          Get-ChildItem -Path src-tauri/target/release -Recurse -Include *.exe,*.msi -ErrorAction SilentlyContinue | Select-Object FullName
      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: VITEPOSs-Windows
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/
          if-no-files-found: error
          retention-days: 30
